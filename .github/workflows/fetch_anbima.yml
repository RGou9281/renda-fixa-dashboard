name: Buscar Dados ANBIMA

on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Executar script de coleta
        env:
          ANBIMA_CLIENT_ID:     ${{ secrets.ANBIMA_CLIENT_ID }}
          ANBIMA_CLIENT_SECRET: ${{ secrets.ANBIMA_CLIENT_SECRET }}
        run: python scripts/fetch_anbima.py

      - name: Commit e push do JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "dados ANBIMA $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
